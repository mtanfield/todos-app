server {
    listen 8080;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm; # Or your main index file
        autoindex on; # Enable directory listing
    }

    # Optional: Proxy API requests if you have a backend
    location /api {
        proxy_pass http://localhost:3001; # Adjust the port as needed
    }
}