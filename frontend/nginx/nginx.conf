server {
    listen 80;

    location / {
        root   /usr/share/nginx/html; # Path to your built React files
        index  index.html;
        # For single-page applications, all unknown paths should fallback to index.html
        try_files $uri $uri/ /index.html;
    }
    # Reverse proxy configuration for all API calls
    location /api/ {
        proxy_pass http://backend:7778;
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}    
