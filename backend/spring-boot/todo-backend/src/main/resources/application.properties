# Database connection properties
spring.datasource.url=jdbc:postgresql://localhost:5433/todos
spring.datasource.username=user
spring.datasource.password=password

# Driver setup
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate configuration
# 'update' is good for development, but consider 'none' or 'validate' for production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Set the dialect for PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Set the port your Spring Boot app listens on
server.port=7778

# optional: don't fail immediately on DB startup (dev-friendly)
spring.datasource.hikari.initialization-fail-timeout=-1

spring.jmx.enabled=true